name: CI/CD Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  ci:
    name: Run CI Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, bcmath, pdo, mysql
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install NPM Dependencies
        run: npm ci

      - name: Prepare Environment
        run: |
          cp .env.example .env

          cat <<EOF >> .env

          APP_ENV=production
          APP_DEBUG=false

          REVERB_APP_ID=local
          REVERB_APP_KEY=local
          REVERB_APP_SECRET=local
          REVERB_HOST=localhost
          REVERB_PORT=8080
          REVERB_SCHEME=http
          EOF

          php artisan key:generate --force

      - name: Build Frontend Assets
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            public/build
            vendor
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Sync Files to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >-
            -avzr
            --delete
            --exclude='.git'
            --exclude='.env'
            --exclude='node_modules'
            --exclude='storage/app'
            --exclude='storage/logs'
            --exclude='storage/framework/sessions'
          path: .
          remote_path: /var/www/capt.sardarit.cloud
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Run Post-Deploy Commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/capt.sardarit.cloud

            echo "Running migrations..."
            php artisan migrate --force

            echo "Clearing old caches..."
            php artisan optimize:clear

            echo "Caching configuration..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Restarting queues and reverb..."
            php artisan queue:restart || true
            php artisan reverb:restart || true

            echo "Fixing permissions..."
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            echo "Deployment completed successfully."