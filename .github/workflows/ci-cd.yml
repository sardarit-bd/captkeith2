name: CI/CD VPS Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Run Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Prepare testing environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite
          php artisan config:clear
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Lint backend
        run: composer lint:check

      - name: Lint frontend
        run: npm run lint:check

      - name: Check formatting
        run: npm run format:check

      - name: Check TypeScript
        run: npm run types:check

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request' && github.ref_name == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Upload project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: "/var/www/capt.sardarit.cloud"
          overwrite: true
          rm: false
          exclude: ".git,node_modules,vendor,storage/logs/*,storage/framework/cache/*,storage/framework/sessions/*,storage/framework/views/*,.env"

      - name: Run deployment commands on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          TARGET_PATH: /var/www/capt.sardarit.cloud
          WEB_USER: nginx
          WEB_GROUP: nginx
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          PHP_FPM_SERVICE: ${{ secrets.PHP_FPM_SERVICE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: TARGET_PATH,WEB_USER,WEB_GROUP,APP_ENV_FILE,PHP_FPM_SERVICE
          script_stop: true
          script: |
            set -e

            sudo mkdir -p "$TARGET_PATH"
            sudo chown -R "$USER":"$USER" "$TARGET_PATH"

            cd "$TARGET_PATH"

            if [ ! -f .env ]; then
              if [ -n "$APP_ENV_FILE" ]; then
                printf '%s' "$APP_ENV_FILE" > .env
              else
                cp .env.example .env
              fi
            fi

            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build

            if ! grep -q '^APP_KEY=base64:' .env; then
              php artisan key:generate --force
            fi
            php artisan migrate --force
            php artisan storage:link || true

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache || true

            sudo chgrp -R "$WEB_GROUP" storage bootstrap/cache
            sudo chmod -R ug+rwx storage bootstrap/cache
            sudo find storage bootstrap/cache -type d -exec chmod 775 {} \;
            sudo find storage bootstrap/cache -type f -exec chmod 664 {} \;

            if command -v setfacl >/dev/null 2>&1; then
              sudo setfacl -R -m u:"$WEB_USER":rwx -m u:"$USER":rwx storage bootstrap/cache
              sudo setfacl -dR -m u:"$WEB_USER":rwx -m u:"$USER":rwx storage bootstrap/cache
            fi

            if [ -n "$PHP_FPM_SERVICE" ]; then
              sudo systemctl reload "$PHP_FPM_SERVICE"
            fi

            sudo systemctl reload nginx || true
